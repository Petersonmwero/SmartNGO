<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Verified — Smart NGO M&amp;E</title>
  <style>
    :root {
      --primary: #0D4A2F;   /* Forest Green */
      --accent: #E8A020;    /* Savannah Amber */
      --background: #F7F5F0; /* Warm Cream */
      --charcoal: #1C1C1E;
      --grey-mid: #6B7280;
      --grey-light: #D1D5DB;
      --success: #166534;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--background);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #FFFFFF;
      max-width: 440px;
      width: 100%;
      border-radius: 18px;
      padding: 48px 32px 32px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(13, 74, 47, 0.10);
      border-top: 5px solid var(--accent);
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 28px;
    }
    .checkmark {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(22, 101, 52, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .checkmark svg { width: 48px; height: 48px; }
    @keyframes pop {
      0% { transform: scale(0.4); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-size: 26px;
      color: var(--primary);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .subtext {
      font-size: 15px;
      color: var(--grey-mid);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .info-box {
      background: var(--background);
      border: 1px solid var(--grey-light);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 14px;
      color: var(--charcoal);
      line-height: 1.6;
      text-align: left;
      margin-bottom: 32px;
    }
    footer {
      border-top: 1px solid var(--grey-light);
      padding-top: 20px;
      font-size: 12px;
      color: var(--grey-mid);
      line-height: 1.5;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 20px 24px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" aria-hidden="true">🌿</div>
    <div class="checkmark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="11" fill="#166534"/>
        <path d="M7 12.5l3.2 3.2L17 9" stroke="#FFFFFF" stroke-width="2.4"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Email Verified Successfully!</h1>
    <p class="subtext">
      Welcome to Smart NGO M&amp;E Platform, {{ first_name }}!<br>
      Your account is now active.
    </p>
    <div class="info-box">
      You can now close this page and log in to the Smart&nbsp;NGO app.
    </div>
    <footer>
      Smart NGO M&amp;E Platform &mdash; University of Eastern Africa, Baraton
    </footer>
  </main>
</body>
</html>
